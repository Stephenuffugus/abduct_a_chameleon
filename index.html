/* ============================ §4 UTILS ============================ */
const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
const clamp01 = v=> v<0?0:(v>1?1:v);
const lerp = (a,b,t)=> a+(b-a)*t;
function smoothstep(edge0,edge1,x){ const t=clamp01((x-edge0)/(edge1-edge0||1e-9)); return t*t*(3-2*t); }
// easing kit (juice)
const easeOutCubic = t=> 1-Math.pow(1-t,3);
const easeInOutCubic = t=> t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
const easeOutQuad = t=> 1-(1-t)*(1-t);
const easeOutBack = t=>{ const c1=1.70158, c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); };
const easeOutElastic = t=>{ if(t<=0)return 0; if(t>=1)return 1; const c4=(2*Math.PI)/3; return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1; };
const pulse = (t,speed)=> 0.5+0.5*Math.sin(t*(speed||1));
function mulberry32(seed){ let a=seed>>>0; return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function hex2rgb(h){ h=(h||'').replace('#','').trim();
  if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  if(!/^[0-9a-fA-F]{6}$/.test(h)) return null;
  return { r:parseInt(h.slice(0,2),16), g:parseInt(h.slice(2,4),16), b:parseInt(h.slice(4,6),16) }; }
function rgb2hex(c){ const h=n=>('0'+Math.round(clamp(n,0,255)).toString(16)).slice(-2);
  return '#'+h(c.r)+h(c.g)+h(c.b); }
function hsv2rgb(h,s,v){ h=((h%360)+360)%360; s=clamp01(s); v=clamp01(v);
  const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c; let r=0,g=0,b=0;
  if(h<60){r=c;g=x;} else if(h<120){r=x;g=c;} else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;} else if(h<300){r=x;b=c;} else {r=c;b=x;}
  return { r:(r+m)*255, g:(g+m)*255, b:(b+m)*255 }; }
function rgb2hsv(c){ const r=c.r/255,g=c.g/255,b=c.b/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn; let h=0;
  if(d){ if(mx===r) h=60*(((g-b)/d)%6); else if(mx===g) h=60*((b-r)/d+2); else h=60*((r-g)/d+4); }
  if(h<0)h+=360; return { h, s:mx?d/mx:0, v:mx }; }
function shadeHex(hex,amt){ const c=hex2rgb(hex)||{r:0,g:0,b:0};
  return rgb2hex({ r:clamp(c.r+amt,0,255), g:clamp(c.g+amt,0,255), b:clamp(c.b+amt,0,255) }); }
function redmean(a,b){ const rb=(a.r+b.r)*0.5, dr=a.r-b.r, dg=a.g-b.g, db=a.b-b.b;
  return Math.sqrt((2+rb/256)*dr*dr + 4*dg*dg + (2+(255-rb)/256)*db*db); }

// §2.1 footprint terrain reference (also the eyedropper source)
function terrainReference(px,py){
  const R=PLAYER_RADIUS, x0=px-R, x1=px+R, y0=py-R, y1=py+R, footArea=(2*R)*(2*R);
  const c0=Math.floor(x0/TILE), c1=Math.floor(x1/TILE), r0=Math.floor(y0/TILE), r1=Math.floor(y1/TILE);
  let aR=0,aG=0,aB=0,aW=0, domKey='void', domW=-1;
  const kw=Object.create(null);                        // P8-3: per-KEY summed footprint weight (add-only)
  for(let row=r0; row<=r1; row++) for(let col=c0; col<=c1; col++){
    const key=terrainAt(col,row);
    const ox=Math.max(0, Math.min(x1,(col+1)*TILE)-Math.max(x0,col*TILE));
    const oy=Math.max(0, Math.min(y1,(row+1)*TILE)-Math.max(y0,row*TILE));
    const w=(ox*oy)/footArea; const c=TERRAIN_RGB[key]||TERRAIN_RGB.void;
    aR+=w*c.r; aG+=w*c.g; aB+=w*c.b; aW+=w;
    kw[key]=(kw[key]||0)+w;
    if(w>domW){ domW=w; domKey=key; }                  // per-tile-max (unchanged)
  }
  if(aW<=0){ const c=TERRAIN_RGB.void; return { rgb:{r:c.r,g:c.g,b:c.b}, dominantKey:'void', dominantW:1 }; }
  // distinct terrain tones under the footprint (pure TERRAIN_RGB), heaviest first — for the
  // per-tone match model + optional Split Camo. On uniform ground this is a single tone (w:1).
  const tones=[]; for(const k in kw) tones.push({ key:k, rgb:TERRAIN_RGB[k]||TERRAIN_RGB.void, w:kw[k]/aW });
  tones.sort((x,y)=>y.w-x.w);
  return { rgb:{ r:aR/aW, g:aG/aW, b:aB/aW }, dominantKey:domKey, dominantW:domW, tones };
}
// Effective match of ONE body color across the footprint: weighted match vs EACH tone.
// On uniform ground (a single tone) this === matchQuality(paint, that terrain) → calibration unchanged.
// On a real terrain seam a single color can't match both halves, so it caps below 1 (the seam tax).
function matchQualityRef(paint, ref){
  const tones=ref.tones;
  if(tones && tones.length>1){ let s=0,w=0; for(const t of tones){ s+=t.w*matchQuality(paint,t.rgb); w+=t.w; } if(w>0) return s/w; }
  return matchQuality(paint, ref.rgb);
}
// Effective match for a body (single color pA, or two colors pA/pB when split is on). Shared by the
// sim (computeCamoFor) and the studio coach so they can never disagree. Returns {mq, mq2}.
function effMatch(pA, pB, split, ref){
  const cap=terrainMatchCap(ref.dominantKey);
  const single=Math.min(matchQualityRef(pA, ref), cap);
  if(split && pB && ref.tones && ref.tones.length>1 && ref.tones[1].w>SPLIT_MIN_W){
    let s=0,w=0; for(const t of ref.tones){ s+=t.w*Math.max(matchQuality(pA,t.rgb), matchQuality(pB,t.rgb)); w+=t.w; }
    const two=Math.min(w>0?s/w:0, cap);
    return { mq:Math.max(single, two), mq2:two };     // two colors never do worse than one
  }
  return { mq:single, mq2:0 };
}

// line-of-sight: sample the segment; blocked if any covered (LoS) cell between endpoints
function segPointDist2(ax,ay,bx,by,px,py){ const dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
  let t=l2>0?((px-ax)*dx+(py-ay)*dy)/l2:0; t=t<0?0:t>1?1:t; const cx=ax+dx*t, cy=ay+dy*t;
  return (px-cx)*(px-cx)+(py-cy)*(py-cy); }
function losClear(ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay, dist=Math.hypot(dx,dy);
  // ink clouds block sight (P5)
  if(round&&round.inks&&round.inks.length){ for(const ik of round.inks){ if(segPointDist2(ax,ay,bx,by,ik.x,ik.y) < ik.r*ik.r) return false; } }
  const steps=Math.max(1, Math.ceil(dist/(TILE*0.5)));
  let lastCol=-999,lastRow=-999;
  for(let i=1;i<steps;i++){ const t=i/steps, x=ax+dx*t, y=ay+dy*t;
    const col=Math.floor(x/TILE), row=Math.floor(y/TILE);
    if(col===lastCol && row===lastRow) continue; lastCol=col; lastRow=row;
    if(terrainAt(col,row)==='void') continue;
    if(coverTypeAt(col,row)) return false;                 // any cover cell blocks LoS
  }
  return true;
}

function rebuildMapDerived(){
  mapCols=MAP.grid.cols; mapRows=MAP.grid.rows; worldW=mapCols*TILE; worldH=mapRows*TILE;
  coverGrid = Array.from({length:mapRows}, ()=> new Array(mapCols).fill(null));
  wallGrid  = Array.from({length:mapRows}, ()=> new Uint8Array(mapCols));
  coverObjects = [];
  for(const o of (MAP.objects||[])){
    if(o.x<0||o.y<0||o.x>=mapCols||o.y>=mapRows) continue;
    coverGrid[o.y][o.x] = o.type;
    if(MOVE_BLOCK[o.type]) wallGrid[o.y][o.x]=1;
    coverObjects.push({ type:o.type, col:o.x, row:o.y, wx:(o.x+0.5)*TILE, wy:(o.y+0.5)*TILE });
  }
  buildTerrainCache();
}

function buildTerrainCache(){
  const w=worldW, h=worldH;
  if(typeof OffscreenCanvas!=='undefined'){ try{ terrainCanvas=new OffscreenCanvas(w,h); }catch(_){ terrainCanvas=document.createElement('canvas'); terrainCanvas.width=w; terrainCanvas.height=h; } }
  else { terrainCanvas=document.createElement('canvas'); terrainCanvas.width=w; terrainCanvas.height=h; }
  terrainCtx=terrainCanvas.getContext('2d');
  const g=terrainCtx;
  for(let row=0; row<mapRows; row++) for(let col=0; col<mapCols; col++){
    const key=terrainAt(col,row); const base=TERRAIN_HEX[key]||TERRAIN_HEX.void;
    const hh=hashInt(col,row);
    // camo-safe dithered base fill (this is the mean the sampler is calibrated to)
    g.fillStyle=shadeHex(base,((hh%13)-6)/6*DITHER_AMP);
    const x0=col*TILE, y0=row*TILE;
    g.fillRect(x0,y0,TILE,TILE);
    if(key!=='void') terrainMotif(g,key,x0,y0,base,hh,col,row);
  }
  // P18: soft seam shading — different-terrain boundaries read as real edges, so the
  // 2-tone hiding spots are VISIBLE on the ground (≈1% tile-mean shift: calibration-safe)
  g.strokeStyle='rgba(6,10,20,0.16)'; g.lineWidth=2; g.beginPath();
  for(let row=0; row<mapRows; row++) for(let col=0; col<mapCols; col++){
    const k=terrainAt(col,row); if(k==='void') continue;
    const kr=terrainAt(col+1,row), kd=terrainAt(col,row+1);
    if(col+1<mapCols && kr!==k && kr!=='void'){ g.moveTo((col+1)*TILE, row*TILE); g.lineTo((col+1)*TILE, (row+1)*TILE); }
    if(row+1<mapRows && kd!==k && kd!=='void'){ g.moveTo(col*TILE, (row+1)*TILE); g.lineTo((col+1)*TILE, (row+1)*TILE); }
  }
  g.stroke();
  // subtle baked grid (skip on hard-surface biomes)
  g.strokeStyle='rgba(150,175,210,0.028)'; g.lineWidth=1; g.beginPath();
  for(let col=0; col<=mapCols; col++){ g.moveTo(col*TILE+0.5,0); g.lineTo(col*TILE+0.5,h); }
  for(let row=0; row<=mapRows; row++){ g.moveTo(0,row*TILE+0.5); g.lineTo(w,row*TILE+0.5); }
  g.stroke();
}
// per-terrain texture motif — amplitude clamped to ±22 via shadeHex so tile MEAN stays camo-safe
function terrainMotif(g,key,x0,y0,base,hh,col,row){
  const T=TILE, cx=x0+T/2, cy=y0+T/2;
  const dk=shadeHex(base,-16), dk2=shadeHex(base,-9), lt=shadeHex(base,14), lt2=shadeHex(base,20);
  const R=(n)=>((hh>>n)&7);   // pseudo-random 0..7 from bit slice
  switch(key){
    case 'grass': case 'moss': { g.strokeStyle=key==='moss'?dk2:shadeHex(base,-13); g.lineWidth=1.4; g.beginPath();
      for(let i=0;i<3;i++){ const bx=x0+4+R(i*3)*3, by=y0+8+R(i*3+2)*3; g.moveTo(bx,by+6); g.lineTo(bx+((i&1)?1.5:-1.5),by); } g.stroke();
      g.fillStyle=lt; g.fillRect(x0+2+R(4)*3,y0+2+R(6)*3,2,2); break; }
    case 'foliage': { for(let i=0;i<3;i++){ g.fillStyle=i&1?dk:lt; g.beginPath();
      g.arc(x0+6+R(i*4)*3, y0+6+R(i*4+2)*3, 4+R(i*4+1)*0.7, 0, TAU); g.fill(); } break; }
    case 'dirt': case 'mud': { for(let i=0;i<4;i++){ g.fillStyle=(i&1)?dk:dk2; g.beginPath();
      g.arc(x0+3+R(i*3)*4, y0+3+R(i*3+1)*4, 1.6+((hh>>i)&1), 0, TAU); g.fill(); } break; }
    case 'sand': { g.strokeStyle=lt; g.lineWidth=1.2; g.globalAlpha=0.7; for(let i=0;i<2;i++){ g.beginPath();
      g.arc(cx-6+R(i*3)*4, cy-6+R(i*3+2)*8, 9, 0.2, 1.5); g.stroke(); } g.globalAlpha=1; break; }
    case 'rock': { g.fillStyle=lt; g.beginPath(); g.moveTo(x0+R(0)*2,y0+T); g.lineTo(cx,y0+3+R(2)*2); g.lineTo(x0+T,y0+T); g.closePath(); g.fill();
      g.fillStyle=dk; g.beginPath(); g.moveTo(x0,y0+T); g.lineTo(cx,cy); g.lineTo(x0,cy+R(3)*2); g.closePath(); g.fill(); break; }
    case 'concrete': { g.strokeStyle=dk; g.lineWidth=1.4; g.globalAlpha=0.6;
      if(col%3===0){ g.beginPath(); g.moveTo(x0+0.5,y0); g.lineTo(x0+0.5,y0+T); g.stroke(); }
      if(row%3===0){ g.beginPath(); g.moveTo(x0,y0+0.5); g.lineTo(x0+T,y0+0.5); g.stroke(); } g.globalAlpha=1; break; }
    case 'metal': { g.strokeStyle=dk; g.lineWidth=1; g.strokeRect(x0+2.5,y0+2.5,T-5,T-5);
      g.fillStyle=lt; g.fillRect(x0+4,y0+4,2,2); g.fillRect(x0+T-6,y0+T-6,2,2); break; }
    case 'snow': { g.fillStyle=lt2; g.fillRect(x0+3+R(0)*3,y0+3+R(2)*3,2,2); g.fillRect(x0+5+R(3)*4,y0+9+R(5)*3,1,1);
      g.fillStyle=dk2; g.globalAlpha=0.5; g.beginPath(); g.arc(cx+R(1)*2,cy+R(4)*2,3,0,TAU); g.fill(); g.globalAlpha=1; break; }
    case 'ice': { g.strokeStyle=lt2; g.lineWidth=1; g.globalAlpha=0.55; g.beginPath();
      g.moveTo(x0+2,y0+T-2); g.lineTo(x0+T*0.6,y0+2); g.moveTo(cx,cy); g.lineTo(cx+R(2)*3,cy-6-R(3)); g.stroke(); g.globalAlpha=1; break; }
    case 'lava': { g.fillStyle=dk; for(let i=0;i<3;i++){ g.beginPath(); g.arc(x0+4+R(i*3)*4,y0+4+R(i*3+1)*4,3+R(i),0,TAU); g.fill(); }
      g.strokeStyle=lt2; g.lineWidth=1.2; g.beginPath(); g.moveTo(x0+R(0)*3,cy); g.lineTo(x0+T,cy+R(4)*2-4); g.stroke(); break; }
    case 'crystal': { g.fillStyle=lt2; g.beginPath(); g.moveTo(cx,y0+3); g.lineTo(cx+5,cy); g.lineTo(cx,y0+T-4); g.lineTo(cx-5,cy); g.closePath(); g.fill();
      g.fillStyle=dk; g.beginPath(); g.moveTo(cx,cy); g.lineTo(cx-5,cy); g.lineTo(cx,y0+T-4); g.closePath(); g.fill(); break; }
    case 'ash': { g.fillStyle=lt; for(let i=0;i<5;i++) g.fillRect(x0+R(i)*4, y0+R(i+2)*4, 1,1); break; }
    case 'water': { g.strokeStyle=lt; g.lineWidth=1.3; g.globalAlpha=0.5; g.beginPath();
      const wy=y0+8+R(0)*3; g.moveTo(x0+2,wy); g.bezierCurveTo(x0+10,wy-3,x0+22,wy+3,x0+T-2,wy); g.stroke(); g.globalAlpha=1; break; }
    case 'void': { g.fillStyle=lt2; g.globalAlpha=0.6; if((hh&3)===0) g.fillRect(x0+R(0)*4,y0+R(2)*4,1,1); g.globalAlpha=1; break; }
  }
}

/* ---- P1 atmosphere: glow sprites, sky, ambient drifters ---- */
function buildGlow(r,g,b){ const S=64,c=document.createElement('canvas'); c.width=c.height=S;
  const x=c.getContext('2d'), rg=x.createRadialGradient(S/2,S/2,0,S/2,S/2,S/2);
  rg.addColorStop(0,'rgba(255,255,255,0.95)'); rg.addColorStop(0.28,'rgba('+r+','+g+','+b+',0.85)');
  rg.addColorStop(1,'rgba('+r+','+g+','+b+',0)'); x.fillStyle=rg; x.beginPath(); x.arc(S/2,S/2,S/2,0,TAU); x.fill(); return c; }
function buildGlows(){ GLOW.cyan=buildGlow(63,208,224); GLOW.amber=buildGlow(242,179,61); GLOW.lava=buildGlow(255,120,40);
  GLOW.crystal=buildGlow(150,120,240); GLOW.pod=buildGlow(150,110,235); GLOW.fire=buildGlow(180,255,140);
  GLOW.mint=buildGlow(120,230,200); GLOW.white=buildGlow(230,240,255); GLOW.red=buildGlow(224,101,94); }
function biomeOf(name){ if(!name) return 'greenwood'; const n=String(name).toLowerCase();
  for(const k in BIOME){ if(n.indexOf(k)>=0) return k; }
  // fallback by dominant terrain
  const counts={}; let best='grass',bc=-1;
  for(let r=0;r<mapRows;r+=2)for(let c=0;c<mapCols;c+=2){ const t=terrainAt(c,r); counts[t]=(counts[t]||0)+1; if(counts[t]>bc){bc=counts[t];best=t;} }
  return BIOME_TERRAINS[best]||'greenwood'; }
function buildSky(){ const c=(typeof OffscreenCanvas!=='undefined')?new OffscreenCanvas(vpW,vpH):document.createElement('canvas');
  if(!c.width){ c.width=vpW; c.height=vpH; } else { c.width=vpW; c.height=vpH; }
  const x=c.getContext('2d'); const lg=x.createLinearGradient(0,0,0,vpH);
  lg.addColorStop(0,biome.skyTop); lg.addColorStop(1,biome.skyBottom); x.fillStyle=lg; x.fillRect(0,0,vpW,vpH);
  const mg=x.createRadialGradient(vpW*0.8,vpH*0.12,10, vpW*0.8,vpH*0.12, Math.max(vpW,vpH)*0.5);
  mg.addColorStop(0,biome.moon); mg.addColorStop(1,'rgba(0,0,0,0)'); x.fillStyle=mg; x.fillRect(0,0,vpW,vpH);
  skyCache=c; }
function visRect(){ const hw=(vpW/2)/zoom, hh=(vpH/2)/zoom; return { x0:cam.x-hw, x1:cam.x+hw, y0:cam.y-hh, y1:cam.y+hh }; }
function spawnDrifter(anywhere){ const v=visRect(); const d=Object.assign({}, biome.drifter);
  d.x = anywhere ? lerp(v.x0,v.x1,rng?rng():Math.random()) : v.x0+ (v.x1-v.x0)*0.0;
  d.y = lerp(v.y0,v.y1, rng?rng():Math.random()); d.ph=(rng?rng():Math.random())*TAU; d.seed=(rng?rng():Math.random()); return d; }
function seedAmbient(){ amb.length=0; const n=Math.min(AMB_CAP_EFF, biome.ambCount);
  for(let i=0;i<n;i++) amb.push(spawnDrifter(true)); }
function updateAmbient(dt){ if(!amb.length) return; const v=visRect(); const m=44;
  for(const d of amb){ d.ph+=dt*d.tw;
    d.x += (d.vx + Math.sin(d.ph)*d.sway*8)*dt; d.y += (d.vy + d.drift*10)*dt;
    if(d.x<v.x0-m||d.x>v.x1+m||d.y<v.y0-m||d.y>v.y1+m){ // recycle into view
      d.x=lerp(v.x0,v.x1,Math.abs((d.seed*97.13)%1)); d.y=lerp(v.y0,v.y1,Math.abs((d.seed*57.7)%1)); d.seed=(d.seed*1.7+0.13)%1; } }
}
function drawAmbientOverhead(){ if(!amb.length||FX_MOTION<=0) return; ctx.globalCompositeOperation='lighter';
  for(const d of amb){ const spr=GLOW[d.spr]||GLOW.white; const tw=0.6+0.4*Math.sin(d.ph); const a=d.a*tw*FX_MOTION;
    const s=d.r*2.2; ctx.globalAlpha=a; ctx.drawImage(spr, d.x-s, d.y-s, s*2, s*2); }
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; }
function drawAmbientGround(v){ if(FX_MOTION<=0) return; let n=0; const t=gfx.t;
  const c0=Math.max(0,Math.floor(v.x0/TILE)), c1=Math.min(mapCols-1,Math.ceil(v.x1/TILE));
  const r0=Math.max(0,Math.floor(v.y0/TILE)), r1=Math.min(mapRows-1,Math.ceil(v.y1/TILE));
  ctx.globalCompositeOperation='lighter';
  for(let row=r0; row<=r1; row++) for(let col=c0; col<=c1; col++){ const key=terrainAt(col,row); if(!key) continue;
    let spr=null,amp=0,rad=0; const hh=hashInt(col,row);
    if(key==='lava'){ spr=GLOW.lava; amp=0.5+0.35*Math.sin(t*3+hh); rad=TILE*0.9; }
    else if(key==='crystal'){ spr=GLOW.crystal; amp=0.16+0.14*Math.sin(t*1.6+hh); rad=TILE*0.8; }
    else if(key==='water'){ spr=GLOW.cyan; amp=0.05+0.05*Math.sin(t*1.2+col*0.7+row); rad=TILE*0.7; }
    else if(key==='ice'){ if(((hh^(gfx.frame>>3))&15)===0){ spr=GLOW.white; amp=0.3; rad=TILE*0.4; } }
    else if(key==='snow'){ if(((hh^(gfx.frame>>4))&31)===0){ spr=GLOW.white; amp=0.4; rad=TILE*0.3; } }
    else continue;
    if(!spr||amp<=0.01) continue; const cx=(col+0.5)*TILE, cy=(row+0.5)*TILE;
    ctx.globalAlpha=amp*FX_MOTION; ctx.drawImage(spr, cx-rad, cy-rad, rad*2, rad*2);
    if(++n>AMB_GLOW_MAX) break;
  }
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  // cover-pod glow pass (alien_pod emits)
  for(const o of coverObjects){ if(o.type!=='alien_pod') continue; if(o.wx<v.x0-TILE||o.wx>v.x1+TILE||o.wy<v.y0-TILE||o.wy>v.y1+TILE) continue;
    const a=0.2+0.15*Math.sin(t*2+o.col); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=a*FX_MOTION;
    ctx.drawImage(GLOW.pod, o.wx-TILE*0.7, o.wy-TILE*0.7, TILE*1.4, TILE*1.4); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; }
}
// adaptive quality auto-scaler (frame-budget safety net)
let _emaDt=16, _slowFrames=0, _fastFrames=0;
function updatePerf(realDt){ _emaDt=_emaDt*0.9+realDt*1000*0.1;
  if(_emaDt>20){ _slowFrames++; _fastFrames=0; if(_slowFrames>30 && qLevel<3){ qLevel++; _slowFrames=0; applyQuality(); } }
  else if(_emaDt<15){ _fastFrames++; _slowFrames=0; if(_fastFrames>120 && qLevel>0){ qLevel--; _fastFrames=0; applyQuality(); } }
}
function applyQuality(){ const base={full:AMB_CAP,reduced:28,minimal:0}[settings.motion]??AMB_CAP;
  AMB_CAP_EFF = qLevel>=1 ? Math.floor(base*0.5) : base;
  if(amb.length>AMB_CAP_EFF) amb.length=AMB_CAP_EFF;
  if(qLevel>=3 && PCAP>90) PCAP=90;
  // struggling device self-heals: drop DPR at qLevel>=2, but hold it (hysteresis) until a FULL recovery
  // (qLevel 0) so it can't flip-flop around the boundary and thrash resize().
  const want = qLevel>=2 ? Math.min(perfBaseCap,1.25) : (qLevel===0 ? perfBaseCap : dprCap);
  if(want!==dprCap){ dprCap=Math.max(1,want); if(typeof cv!=='undefined' && cv && MAP) resize(); } }

/* ---- map loading (manifest + baked fallback) ---- */
// RLE-expanded baked map guarantees offline play (no maps/ folder needed)
function makeBakedMap(){
  const cols=44, rows=32; const rnd=mulberry32(20260719);
  const t=Array.from({length:rows},()=>Array.from({length:cols},()=>'grass'));
  const inb=(x,y)=> x>=0&&y>=0&&x<cols&&y<rows;
  const blob=(cx,cy,r,key)=>{ for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++){
    const d=Math.hypot(x-cx,y-cy)+rnd()*1.2-0.6; if(d<=r&&inb(x,y)) t[y][x]=key; } };
  blob(9,8,4,'water'); blob(11,10,2,'water');
  blob(33,22,5,'rock'); blob(30,7,4,'foliage'); blob(35,10,2,'foliage');
  blob(10,24,4,'sand'); blob(20,15,4,'dirt'); blob(22,26,3,'moss');
  const objs=[], seen=new Set();
  const put=(x,y,type)=>{ const k=x+','+y; if(inb(x,y)&&!seen.has(k)){ seen.add(k); objs.push({x,y,type}); } };
  for(let i=0;i<26;i++){ const x=(rnd()*cols)|0, y=(rnd()*rows)|0; if(t[y][x]==='foliage') put(x,y,'tree'); }
  for(let i=0;i<12;i++){ const x=(rnd()*cols)|0, y=(rnd()*rows)|0; if(t[y][x]==='rock') put(x,y,'boulder'); }
  put(19,14,'crate'); put(21,16,'barrel'); put(23,14,'crate'); put(24,25,'dead_tree');
  const spawns=[{x:22,y:16,role:'hider'}];
  [[2,2],[41,2],[41,29],[2,29]].forEach(([x,y])=>spawns.push({x,y,role:'seeker'}));
  // extra hider spawns
  [[9,8],[33,22],[30,8],[10,24],[20,26],[24,6],[38,26]].forEach(([x,y])=>spawns.push({x,y,role:'hider'}));
  return { format:'scanner-map', version:1, name:'Prototype Meadow', grid:{cols,rows}, terrain:t, objects:objs, spawns };
}
let BAKED_MAP = null;

async function loadLevels(){
  BAKED_MAP = makeBakedMap();
  LEVELS = [];
  try{
    const res = await fetch('maps/levels.json');
    if(res.ok){
      const list = await res.json();
      list.forEach((lv,i)=> LEVELS.push({ file:lv.file, name:lv.name, display:lv.display||lv.name, data:null, loaded:false, thumb:null,
        biome: lv.biome || biomeOf(lv.name),   // P17: region grouping in the level select
        unlockLevel: i>=6 ? 2+(i-6) : 0 }));   // P12: the expansion set unlocks along the XP arc (Lv 2..7); first six always free
    }
  }catch(_){ /* file:// or unhosted — baked only */ }
  // always add the baked prototype card at the end
  LEVELS.push({ file:null, name:'prototype', display:'Prototype Meadow — the training field', data:BAKED_MAP, loaded:true, thumb:null, biome:'greenwood' });
}
async function fetchLevelData(entry){
  if(entry.loaded && entry.data) return entry.data;
  if(!entry.file){ entry.data=BAKED_MAP; entry.loaded=true; return entry.data; }
  try{
    const res=await fetch(entry.file); if(!res.ok) throw 0;
    const j=await res.json();
    if(!j.grid || !Array.isArray(j.terrain)) throw 0;
    entry.data=j; entry.loaded=true; return j;
  }catch(_){ entry.data=BAKED_MAP; entry.loaded=true; entry.usedBaked=true; return BAKED_MAP; }
}
function setActiveMap(map){ MAP=map; rebuildMapDerived(); }

// 1px/tile thumbnail (cached offscreen) for LEVEL_SELECT cards
function buildThumb(map){
  const c=map.grid.cols, r=map.grid.rows;
  const cv=document.createElement('canvas'); cv.width=c; cv.height=r;
  const g=cv.getContext('2d');
  for(let y=0;y<r;y++)for(let x=0;x<c;x++){ g.fillStyle=TERRAIN_HEX[map.terrain[y][x]]||TERRAIN_HEX.void; g.fillRect(x,y,1,1); }
  g.fillStyle='rgba(20,20,28,0.55)';
  for(const o of (map.objects||[])) g.fillRect(o.x,o.y,1,1);
  return cv;
}

/* ============================ §2 CAMO / CONCEALMENT ============================ */
function matchQuality(paint,ref){
  const d=redmean(paint,ref);
  const t=clamp01((d-D_PERFECT)/(D_EXPOSED-D_PERFECT));
  return 1 - t*t*(3-2*t);
}
function terrainMatchCap(k){ return k==='lava'?LAVA_MATCH_CAP : k==='void'?0 : 1; }
function terrainConcealCap(k){ switch(k){
  case 'lava': return LAVA_CONCEAL_CAP; case 'void': return 0;
  case 'water': return WATER_CONCEAL_CAP; case 'crystal': return CRYSTAL_CONCEAL_CAP;
  default: return 0.99; } }
function coverBonus(px,py){
  let best=0;
  for(const o of coverObjects){
    const dx=px-o.wx, dy=py-o.wy;
    const d=Math.max(0, Math.hypot(dx,dy)-TILE*0.42);   // distance to object edge (circle approx)
    if(d<COVER_RADIUS){ const m=(COVER_MAX[o.type]||0)*(1-d/COVER_RADIUS); if(m>best) best=m; }
  }
  return best;
}
function concealment(mq,S,cb,terrCap,openCap){
  let base=Math.min(Math.pow(mq,GAMMA_M)*Math.pow(S,GAMMA_S), openCap||MAX_CONCEAL_OPEN);
  let c=base+cb*(1-base);
  return Math.min(c, CONCEAL_HARDCAP, terrCap);
}
function conspicuity(conceal,m,shifting){
  return clamp01((1-conceal)+MOVE_BEACON*m+(shifting?SHIFT_SHIMMER:0));
}

// How well the tone you're editing matches the ground it should cover: single mode → vs the footprint

function activeAimMatch(){
  const ref=player.ref; if(!ref) return { mq:0, refRgb:{r:0,g:0,b:0} };
  let refRgb=ref.rgb;
  if(player.splitPaint && ref.tones && ref.tones.length>1){
    const at=activeTarget(); let bd=Infinity;
    for(const t of ref.tones){ const d=redmean(at,t.rgb); if(d<bd){ bd=d; refRgb=t.rgb; } }

// P8-1: Live Match Coach — PURE READ-ONLY. Teaches the redmean metric by naming the single biggest way
// to nudge the AIM color toward the ground it should match. Never writes any sim/paint state.
function paintCoach(){
  const mqNow=player.mq;
  const mqAim=player.ref?effMatch(player.targetPaint, player.targetPaint2, player.splitPaint, player.ref).mq:0;
  const word=mqNow>=0.85?'HIDDEN':(mqNow>=0.5?'BLENDING':'EXPOSED');
  let hint='matched', glyph='✓';
  if(player.ref){
    const aim=activeAimMatch();                              // hint targets the ACTIVE tone's terrain tone
    if(aim.mq<0.85){
      const A=rgb2hsv(activeTarget()), R=rgb2hsv(aim.refRgb);
      const dv=R.v-A.v, ds=R.s-A.s;
      const warm=h=>Math.cos(h*Math.PI/180);
      const dw=(warm(R.h)-warm(A.h))*0.5*Math.min(A.s,R.s);   // hue only matters when both are colorful
      const cand=[ {m:Math.abs(dv), w:dv>0?'lighter':'darker',    g:dv>0?'▲':'▼'},
                   {m:Math.abs(ds), w:ds>0?'more vivid':'more muted', g:ds>0?'◆':'◇'},
                   {m:Math.abs(dw), w:dw>0?'warmer':'cooler',      g:dw>0?'☼':'❄'} ];
      cand.sort((a,b)=>b.m-a.m); hint=cand[0].w; glyph=cand[0].g;
    }
  }
  return { mqNow, mqAim, word, hint, glyph };
}

  if(ctrlMode==='PAINT' && !studio.open){ ctrlMode='MOVE'; camLock=false; }   // heal any close-without-exit desync (never leave the hider rooted)

  else { gpCam.x=0; gpCam.y=0; }

  let speed=speedFromMag(moveMag); if(creep) speed=Math.min(speed,PLAYER_CREEP);   // Shift/L2 still forces sneak

/* gamepad (polled; edges handled in updateGamepadEdges) */
const gpPrev={};
function pollGamepad(){
  const pads=navigator.getGamepads?navigator.getGamepads():[]; let pad=null;
  for(const p of pads){ if(p){ pad=p; break; } }
  if(!pad) return null;
  const dz=v=>Math.abs(v)<0.15?0:v;
  const mx=dz(pad.axes[0]||0), my=dz(pad.axes[1]||0);
  const rx=dz(pad.axes[2]||0), ry=dz(pad.axes[3]||0);   // right stick = camera pan (P9)
  const b=pad.buttons; const down=i=>!!(b[i]&&b[i].pressed);
  return { mx, my, creep:down(7), rx, ry, pad };
}
function updateGamepadEdges(){
  const pads=navigator.getGamepads?navigator.getGamepads():[]; let pad=null;
  for(const p of pads){ if(p){ pad=p; break; } }
  if(!pad) return;
  const b=pad.buttons; const edge=i=>{ const p=!!(b[i]&&b[i].pressed), e=p&&!gpPrev[i]; gpPrev[i]=p; return e; };
  if(b.some(x=>x&&x.pressed)) ensureAudio();
  if(appState==='ROUND' && roundState!=='PAUSED'){
    const hunt = round && round.mode==='HUNT';
    if(hunt){ if(edge(0)||edge(3)) huntPulse(); }                     // HUNT: A/Y scan pulse
    else { if(edge(3)||edge(2)) togglePaintMode();                   // Y / X → paint mode
      if(edge(5)) toggleInspect();                                   // RB → inspect mode
      if(edge(6)||edge(4)) instantMatch();                           // LB match
      if(ctrlMode==='INSPECT'){ if(edge(12)) stepDetent(1); if(edge(13)) stepDetent(-1); }   // dpad = zoom detents while looking
      if(edge(1)){ if(ctrlMode==='PAINT') exitPaint(); else if(ctrlMode==='INSPECT') exitInspect(); } }  // B backs out one step
    if(edge(9)) togglePause();                                       // Start
  } else {
    // menus AND the paused overlay (both use navList)
    if(edge(9) && roundState==='PAUSED'){ resumeRound(); return; }   // Start un-pauses
    if(edge(0)) menuConfirm();
    if(edge(1)){ if(appState==='ROUND'&&roundState==='PAUSED') resumeRound(); else menuBack(); }
    if(edge(14)) menuNav(-1,0); if(edge(15)) menuNav(1,0);
    if(edge(12)) menuNav(0,-1); if(edge(13)) menuNav(0,1);
  }
}

/* ---- P9: wheel zoom (desktop; ctrl+wheel = trackpad pinch, handled identically) ---- */
function onWheel(e){
  e.preventDefault();                                            // always eat it — never page-zoom over the game
  const dy=(e.deltaMode===1?e.deltaY*33:e.deltaY)*(e.ctrlKey?3:1);
  if(appState==='LEVEL_SELECT'){ levelScroll=clamp(levelScroll+dy*0.6,0,levelMaxScroll); return; }
  if(appState==='SETTINGS'){ settingsScroll=clamp(settingsScroll+dy*0.6,0,settingsMaxScroll); return; }
  if(appState!=='ROUND'||roundState!=='PLAYING'||!round||round.mode==='HUNT'||!player.alive) return;
  ensureAudio();
  if(ctrlMode==='MOVE'){ if(dy>0){ enterInspect(); vz=vzTarget=1; } else return; }   // pulling back = "let me look"
  else if(ctrlMode==='PAINT'){ if(!camLock){ camLock=true; SFX.shutter(); } }  // desktop graduates into the hold (no nudge — the wheel IS the framing)
  const w=screenToWorld(e.clientX,e.clientY);                    // zoom toward the cursor: camPan-only edit, projections untouched
  vz=clamp(vz*Math.exp(-dy*WHEEL_K), vzMin(), VZ_IN); vzTarget=vz;
  const z=liveZoom();
  camPan.x=(w.x-(e.clientX-vpW/2)/z)-camFollow.x; camPan.y=(w.y-(e.clientY-vpH/2)/z)-camFollow.y;
  clampPan(panMaxNow()); reanchorPans();
}
/* ---- P9: two-finger pinch — a second non-UI pointer while a pan finger is live becomes a pinch pair ---- */
function cancelPinch(){ if(!pinch) return; const A=pointers.get(pinch.a), B=pointers.get(pinch.b); pinch=null;
  for(const s of [A,B]) if(s && s.role==='pinch'){ s.role='pan'; s.sx0=s.sx; s.sy0=s.sy; s.px0=camPan.x; s.py0=camPan.y; s.tap=false; } }  // survivors become live pans — no dead fingers
function tryStartPinch(id,sx,sy){
  if(pinch || !round || round.mode==='HUNT' || roundState!=='PLAYING' || !player.alive) return false;
  let live=null; for(const [pid,pp] of pointers){ if(pp.role==='pan'){ live={id:pid,p:pp}; break; } }
  if(!live) return false;
  if(!heldCam()){                                               // in MOVE both fingers must be on the pan side (never conscript the joystick)
    const joyOnLeft=settings.handed!=='left';
    const onPanSide = joyOnLeft ? (sx>=vpW*0.5) : (sx<vpW*0.5);
    if(!(ctrlMode==='MOVE' && onPanSide)) return false;
  }
  const d0=Math.hypot(sx-live.p.sx, sy-live.p.sy); if(d0<PINCH_MIN_D) return false;
  if(ctrlMode==='MOVE'){ enterInspect(); vz=vzTarget=1; }       // pinch = look: the discovery moment
  const mx=(sx+live.p.sx)/2, my=(sy+live.p.sy)/2, w=screenToWorld(mx,my);
  live.p.role='pinch'; pointers.set(id,{sx,sy,role:'pinch'});
  pinch={ a:live.id, b:id, d0, vz0:vz, wx:w.x, wy:w.y };
  return true;
}

function onPointerMove(e){

    if(p.tap && Math.hypot(sx-p.tx,sy-p.ty)>TAP_SLOP) p.tap=false;
    camPan.x=p.px0+(sx-p.sx0)/zoom; camPan.y=p.py0+(sy-p.sy0)/zoom;

  else if(p.role==='lvscroll'){ if(Math.abs(sy-p.sy0)>TAP_SLOP) p.moved=true;

function onPointerUp(e){

    if(s && s.role==='pinch'){ s.role='pan'; s.sx0=s.sx; s.sy0=s.sy; s.px0=camPan.x; s.py0=camPan.y; s.tap=false; }

}

/* ---- movement + collision (§5.3) ---- */
function circleBlocked(px,py){
  const R=PLAYER_RADIUS;
  const c0=Math.floor((px-R)/TILE), c1=Math.floor((px+R)/TILE);
  const r0=Math.floor((py-R)/TILE), r1=Math.floor((py+R)/TILE);
  for(let row=r0; row<=r1; row++) for(let col=c0; col<=c1; col++){
    if(!blocksMove(col,row)) continue;
    const rx=col*TILE, ry=row*TILE;
    const nx=clamp(px,rx,rx+TILE), ny=clamp(py,ry,ry+TILE);
    const dx=px-nx, dy=py-ny; if(dx*dx+dy*dy < R*R) return true;
  }
  return false;
}
function movePlayer(dt){
  const dominant = player.ref ? player.ref.dominantKey : 'grass';
  const mult = MOVE_MULT[dominant] != null ? MOVE_MULT[dominant] : MOVE_MULT._default;
  // DASH burst overrides normal movement, ignores terrain mult
  if(player.dashT>0){ player.dashT-=dt; player.vx=player.dashDx*DASH_SPEED; player.vy=player.dashDy*DASH_SPEED;
    let dx=player.x+player.vx*dt; if(!circleBlocked(dx,player.y)) player.x=dx; else player.dashT=0;
    let dy=player.y+player.vy*dt; if(!circleBlocked(player.x,dy)) player.y=dy; else player.dashT=0;
    player.x=clamp(player.x,PLAYER_RADIUS,worldW-PLAYER_RADIUS); player.y=clamp(player.y,PLAYER_RADIUS,worldH-PLAYER_RADIUS); return; }
  // unit direction × analog curve speed (INSPECT nudges slowly for fine repositioning)
  const mvp=Math.hypot(input.mx,input.my);
  const ux=mvp>1e-4?input.mx/mvp:0, uy=mvp>1e-4?input.my/mvp:0;
  const base=(ctrlMode==='INSPECT')?input.moveMag*INSPECT_NUDGE:input.speed;
  const desx = ux*base*mult, desy = uy*base*mult;
  if(dominant==='ice'){ const k=Math.min(1, dt/ICE_MOMENTUM_TAU);
    player.vx+=(desx-player.vx)*k; player.vy+=(desy-player.vy)*k; }
  else { player.vx=desx; player.vy=desy; }
  // integrate axis-separated
  let nx=player.x+player.vx*dt;
  if(!circleBlocked(nx,player.y)) player.x=nx; else player.vx=0;
  let ny=player.y+player.vy*dt;
  if(!circleBlocked(player.x,ny)) player.y=ny; else player.vy=0;
  player.x=clamp(player.x, PLAYER_RADIUS, worldW-PLAYER_RADIUS);
  player.y=clamp(player.y, PLAYER_RADIUS, worldH-PLAYER_RADIUS);
}

/* ============================ §6 BOT UFO AI ============================ */
let opennessGrid=null, openCells=[];

      if(opennessGrid[nr][nc]===-1){ opennessGrid[nr][nc]=d+1; q.push([nc,nr]); } } }
  openCells=[];
  for(let r=0;r<mapRows;r++)for(let c=0;c<mapCols;c++){
    const o=opennessGrid[r][c]; if(o>=2 && terrainAt(c,r)!=='void' && !blocksMove(c,r)) openCells.push({col:c,row:r,o}); }
  if(openCells.length<8){ // fallback: any walkable
    openCells=[]; for(let r=0;r<mapRows;r++)for(let c=0;c<mapCols;c++) if(!blocksMove(c,r)) openCells.push({col:c,row:r,o:1}); }
}
function makePatrol(rng, fromX, fromY){
  const n=5+((rng()*4)|0);
  const picks=[];
  for(let i=0;i<n && openCells.length;i++){ const cell=openCells[(rng()*openCells.length)|0];
    picks.push({ x:(cell.col+0.5)*TILE, y:(cell.row+0.5)*TILE }); }
  // nearest-neighbor tour from (fromX,fromY)
  const tour=[]; let cx=fromX, cy=fromY; const used=new Array(picks.length).fill(false);
  for(let i=0;i<picks.length;i++){ let bi=-1,bd=1e18;
    for(let j=0;j<picks.length;j++){ if(used[j])continue; const d=(picks[j].x-cx)**2+(picks[j].y-cy)**2; if(d<bd){bd=d;bi=j;} }
    if(bi<0)break; used[bi]=true; tour.push(picks[bi]); cx=picks[bi].x; cy=picks[bi].y; }
  return tour.length?tour:[{x:fromX,y:fromY}];
}
function makeUfo(spawnX,spawnY){
  return { x:spawnX, y:spawnY, vx:0, vy:0, heading:rng()*Math.PI*2, state:'PATROL',

    patrol:makePatrol(rng,spawnX,spawnY), patrolIdx:0, scanPhase:rng()*Math.PI*2,
    reacquireTimer:0, cooldownTimer:0, giveupTimer:0, investHover:0, rerollT:0,
    signal:0, beamHold:0, controller:BotSeeker };

// multiplayer-forward seam: a controller returns an intent; BotSeeker is the built-in AI.
const BotSeeker = { think(){ /* intent computed inline in updateUfo for the offline build */ } };

function turnToward(cur,target,maxStep){ let d=target-cur; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI;
  if(d>maxStep)d=maxStep; else if(d<-maxStep)d=-maxStep; return cur+d; }
function steer(u,tx,ty,maxSpd,dt){ const dx=tx-u.x, dy=ty-u.y, dist=Math.hypot(dx,dy);
  if(dist<0.001) return; u.heading=turnToward(u.heading, Math.atan2(dy,dx), TURN_RATE*dt);
  const spd=Math.min(maxSpd, dist/ARRIVE_DT); u.vx=Math.cos(u.heading)*spd; u.vy=Math.sin(u.heading)*spd;
  u.x+=u.vx*dt; u.y+=u.vy*dt; u.x=clamp(u.x,0,worldW); u.y=clamp(u.y,0,worldH); }

function updateBots(dt){
  const D=round.diff, ufos=round.ufos;
  // §6.7 coordination (HARD): shared belief
  if(D.COORDINATE){
    for(const a of ufos){ if(a.suspicion>=ENTER_INVEST){
      for(const b of ufos){ if(b===a) continue; if(b.state==='PATROL'||b.state==='SCAN'){
        if((a.x-b.x)**2+(a.y-b.y)**2 < COORD_RANGE*COORD_RANGE){
          b.lastSuspect.x=a.lastSuspect.x; b.lastSuspect.y=a.lastSuspect.y;
          b.suspicion=Math.max(b.suspicion,0.5); } } } } }
  }
  let nearest=0;
  for(const u of ufos){ if(u.remote){ remoteUfoStep(u,dt,D); } else updateUfo(u,dt,D);
    const d=Math.hypot(u.x-player.x,u.y-player.y); const prox=clamp01(1-d/(D.SCAN_R*2)); if(prox>nearest)nearest=prox; }
  round.nearUfo=nearest;
  let maxS=0; for(const u of ufos) if(u.suspicion>maxS) maxS=u.suspicion; round.maxSusp=maxS;
  // §6.7 separation
  if(D.COORDINATE){ const sep=D.SCAN_R*1.4;
    for(let i=0;i<ufos.length;i++)for(let j=i+1;j<ufos.length;j++){ const a=ufos[i],b=ufos[j];
      if(a.state==='CHASE'||a.state==='BEAM'||b.state==='CHASE'||b.state==='BEAM')continue;
      const dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy)||1; if(d<sep){ const f=(1-d/sep)*40*dt;
        a.x+=dx/d*f; a.y+=dy/d*f; b.x-=dx/d*f; b.y-=dy/d*f; } } }
}

function updateUfo(u,dt,D){
  u.scanPhase += 2.2*dt;
  const dx=player.x-u.x, dy=player.y-u.y, d=Math.hypot(dx,dy);
  // ---- sensing (unless COOLDOWN) ----
  let signal=0, sx=player.x, sy=player.y;
  if(u.state!=='COOLDOWN'){
    if(d<=D.SCAN_R){ const clear=losClear(u.x,u.y,player.x,player.y);
      if(clear){ const prox=smoothstep(0,1, clamp01(1-d/D.SCAN_R)); signal=player.C*prox; } }
    // DECOYS: a painted twin can out-signal you and steal belief (max signal wins)
    if(round.decoys.length){ for(const dc of round.decoys){ const dd=Math.hypot(dc.x-u.x,dc.y-u.y);
      if(dd<=D.SCAN_R && losClear(u.x,u.y,dc.x,dc.y)){ const ds=dc.C*smoothstep(0,1,clamp01(1-dd/D.SCAN_R));
        if(ds>signal){ signal=ds; sx=dc.x; sy=dc.y; } } } }
    if(signal>D.NOISE_FLOOR){
      const grace = round.spawnGrace>0 ? 0.5 : 1;
      u.suspicion += D.SUSPECT_GAIN*signal*dt*grace;
      const k=clamp(signal,0.1,1)*BELIEF_TRACK;
      u.lastSuspect.x += (sx-u.lastSuspect.x)*Math.min(1,k*dt);
      u.lastSuspect.y += (sy-u.lastSuspect.y)*Math.min(1,k*dt);
      u.lastSuspectConf=Math.max(u.lastSuspectConf,signal);
    } else { u.suspicion -= D.SUSPECT_DECAY*dt; u.lastSuspectConf -= 0.5*dt; }
  } else { u.suspicion -= D.SUSPECT_DECAY*2*dt; }
  // lock-inertia in CHASE/BEAM
  if((u.state==='CHASE'||u.state==='BEAM') && d<D.SCAN_R && signal>0.001 && losClear(u.x,u.y,player.x,player.y))
    u.suspicion=Math.max(u.suspicion,0.9);
  u.suspicion=clamp01(u.suspicion); u.signal=signal;
  const prev=u.state;
  // ---- transitions + movement ----
  switch(u.state){
    case 'PATROL': {
      if(u.suspicion>=ENTER_SUSPECT){ u.state='SCAN'; break; }
      u.rerollT+=dt; if(u.rerollT>=D.PATROL_REROLL){ u.rerollT=0; u.patrol=makePatrol(rng,u.x,u.y); u.patrolIdx=0; }
      const wp=u.patrol[u.patrolIdx]||{x:u.x,y:u.y};
      steer(u,wp.x,wp.y,D.PATROL_SPD,dt);
      if(Math.hypot(wp.x-u.x,wp.y-u.y)<D.SCAN_R*0.4) u.patrolIdx=(u.patrolIdx+1)%u.patrol.length;
      break; }
    case 'SCAN': {
      if(u.suspicion<EXIT_SUSPECT){ u.state='PATROL'; break; }
      if(u.suspicion>=ENTER_INVEST){ u.state='INVESTIGATE'; u.giveupTimer=0; break; }
      // orbit the suspicion point slowly
      const ang=u.scanPhase*0.8; const ox=u.lastSuspect.x+Math.cos(ang)*40, oy=u.lastSuspect.y+Math.sin(ang)*40;
      steer(u,ox,oy,D.SCAN_SPD,dt); break; }
    case 'INVESTIGATE': {
      if(u.suspicion>=ENTER_CHASE && losClear(u.x,u.y,player.x,player.y)){ u.state='CHASE'; break; }
      steer(u,u.lastSuspect.x,u.lastSuspect.y,D.INVEST_SPD,dt);
      const arrived=Math.hypot(u.lastSuspect.x-u.x,u.lastSuspect.y-u.y)<D.SCAN_R*0.5;
      if(arrived){ u.investHover+=dt; }
      u.giveupTimer+= (u.suspicion<ENTER_INVEST? dt:0);
      if(u.giveupTimer>=D.GIVEUP_TIME){ u.state='COOLDOWN'; u.cooldownTimer=0; u.investHover=0; }
      break; }
    case 'CHASE': {
      if(u.suspicion<DROP_CHASE){ u.state='INVESTIGATE'; u.giveupTimer=0; break; }
      const tx = (d<D.SCAN_R && losClear(u.x,u.y,player.x,player.y))?player.x:u.lastSuspect.x;
      const ty = (d<D.SCAN_R && losClear(u.x,u.y,player.x,player.y))?player.y:u.lastSuspect.y;
      steer(u,tx,ty,D.CHASE_SPD,dt);
      if(d<BEAM_R){ u.state='BEAM'; u.reacquireTimer=0; u.beamHold=0; addTrauma(TRAUMA.beamLock); hitstopMs(40); punchZoom(0.05,120,300); vibe(40); }
      break; }
    case 'BEAM': {
      // §6.5 break checks BEFORE charge
      if(d>BEAM_BREAK_R){ u.state='CHASE'; break; }
      const clear=losClear(u.x,u.y,player.x,player.y);
      if(!clear){ u.reacquireTimer+=dt; if(u.reacquireTimer>REACQUIRE_TIME){ u.state='CHASE'; break; } }
      else u.reacquireTimer=0;
      // spring-track over the player
      steer(u,player.x,player.y,D.BEAM_TRACK_SPD,dt);
      if(round.diff.practice){ // never completes; flash SPOTTED then lose interest
        u.beamHold+=dt; round.spottedFlash=0.3;
        if(u.beamHold>2){ u.state='INVESTIGATE'; u.suspicion*=0.5; u.giveupTimer=0; }
        break;
      }
      if(player.C<BEAM_HOLD_C){ u.state='CHASE'; break; }             // re-hide escape
      else if(d<BEAM_R && clear && player.C>=BEAM_HOLD_C){
        u.beamCharge += (1/D.LOCK_TIME)*dt;
        if(u.beamCharge>=1){ triggerAbduction(u); }
      } else u.beamCharge -= BEAM_DRAIN*dt;
      break; }
    case 'COOLDOWN': {
      u.cooldownTimer+=dt; u.vx*=0.9; u.vy*=0.9;
      if(u.cooldownTimer>=D.COOLDOWN_TIME){ u.state='PATROL'; u.suspicion=0; u.rerollT=0; }
      break; }
  }
  if(u.state!=='BEAM') u.beamCharge=Math.max(0,u.beamCharge-BEAM_DRAIN*dt*0.5);
  u.beamCharge=clamp01(u.beamCharge);
  // near-miss: was locking you in a beam, you escaped before abduction (spec §9)
  if(prev==='BEAM' && u.state!=='BEAM' && !round.caught && !round.diff.practice && u.beamCharge>0.05){ round.metrics.nearMisses++; nearMiss(); }
  // spotted event (suspicion crosses ENTER_CHASE upward)
  if(prev!=='CHASE'&&prev!=='BEAM' && (u.state==='CHASE'||u.state==='BEAM')){
    round.metrics.spottedCount++; round.spottedReason=spottedReason(player.mq,player.m,player.S,player.ref.dominantKey);
    round.reasonUntil=nowMs()+2600; SFX.spotted(); addTrauma(TRAUMA.spotted); punchZoom(-0.05,90,420); FX.spottedV=1; spawnShards(player.x,player.y,COL.danger,9); vibe([30,50,30]);
    // forgiving: a kid caught mid-paint/look is sent home with a warning — the camera GLIDES back (never snaps)
    if(ctrlMode!=='MOVE' && !round.diff.practice){ if(holdBracketT>0.3) spawnShards(player.x,player.y,COL.amber,6);
      goHome(); panBoost=HOLD_GLIDE_MUL; showToast('Spotted — move!'); }
  }
  if((prev==='CHASE'||prev==='SCAN'||prev==='INVESTIGATE') && u.suspicion<EXIT_SUSPECT && u.state==='PATROL') SFX.relief();
}

function computeZoom(){ zoomBase=clamp(Math.min(vpW,vpH)/(TARGET_VISIBLE_TILES*TILE),ZOOM_MIN,ZOOM_MAX); zoom=zoomBase; }
function updateCamera(dt){

  const zt=heldCam()?1:0; inspectZoomT+=(zt-inspectZoomT)*Math.min(1,dt*INSPECT_ZOOM_RATE*panBoost);
  if(vzTarget<vzMin()) vzTarget=vzMin();                          // a perf-tier drop lifts an already-FAR zoom back up
  if(!pinch) vz+=(vzTarget-vz)*Math.min(1,dt*VZ_RATE);            // pinch/wheel drive vz 1:1; buttons/keys ease
  zoom=liveZoom();
  if(Math.abs(zoom-_lastZoomFrame)>1e-4){ if(!pinch) reanchorPans(); _lastZoomFrame=zoom; }   // zoom moved under a live drag → re-base its grab
  holdBracketT+=((camLock?1:0)-holdBracketT)*Math.min(1,dt*(camLock?10:14));
  // (2) eased follow anchor (velocity lookahead ONLY in MOVE)
  const lead=ctrlMode==='MOVE'?1:0;
  const lx=clamp(player.vx*CAM_LOOK_K,-CAM_LOOK_MAX,CAM_LOOK_MAX)*lead, ly=clamp(player.vy*CAM_LOOK_K,-CAM_LOOK_MAX,CAM_LOOK_MAX)*lead;
  FX.camLeadX += (lx-FX.camLeadX)*Math.min(1,dt*CAM_LOOK_SMOOTH); FX.camLeadY += (ly-FX.camLeadY)*Math.min(1,dt*CAM_LOOK_SMOOTH);
  const tx=player.x+FX.camLeadX, ty=player.y+FX.camLeadY;
  const d=Math.hypot(tx-camFollow.x, ty-camFollow.y);
  if(d>CAM_DEADZONE){ const t=1-Math.exp(-CAM_STIFFNESS*dt); camFollow.x+=(tx-camFollow.x)*t; camFollow.y+=(ty-camFollow.y)*t; }
  // (2.5) gamepad right stick pans the camera (rate-based) in MOVE peek and while looking/held
  const gpLive = roundState==='PLAYING' && round && round.mode!=='HUNT';   // never drift during pause/countdown/cutscene or in HUNT
  const gpm=gpLive ? Math.hypot(gpCam.x,gpCam.y) : 0;
  if(gpm>0.02 && (ctrlMode==='MOVE'||heldCam())){ camPan.x+=gpCam.x*420*dt; camPan.y+=gpCam.y*420*dt; }

/* ============================ §2.7 CAMO STEP ============================ */
function updatePaint(dt){ let maxd=0; const step=PAINT_SHIFT_SPEED*dt;
  for(const ch of ['r','g','b']){
    const diff=player.targetPaint[ch]-player.currentPaint[ch]; player.currentPaint[ch]+=clamp(diff,-step,step);
    maxd=Math.max(maxd, Math.abs(player.targetPaint[ch]-player.currentPaint[ch])); }
  if(player.splitPaint){ for(const ch of ['r','g','b']){
    const diff=player.targetPaint2[ch]-player.currentPaint2[ch]; player.currentPaint2[ch]+=clamp(diff,-step,step);
    maxd=Math.max(maxd, Math.abs(player.targetPaint2[ch]-player.currentPaint2[ch])); } }
  player.shifting = maxd>SHIFT_DELTA_EPS;
}
// actor-generalized camo (player is actor #0; bot hiders in HUNT reuse this exactly)
function updateStillnessFor(a, dt, speed, onIce, inWater){
  let m=smoothstep(MOVE_STILL_MAX, MOVE_FULL, speed);
  if(inWater && speed>MOVE_STILL_MAX) m=Math.max(m, WATER_RIPPLE_FLOOR);
  const Star=1-m; let tau=(Star<a.S)?STILL_ATTACK:STILL_RECOVER; if(onIce) tau*=ICE_SETTLE_MULT;
  if(a.freeze) tau*=FREEZE_SETTLE_MULT;
  a.S += (Star-a.S)*Math.min(1, dt/tau); return m;
}
function computeCamoFor(a, dt, speed){
  const ref=terrainReference(a.x,a.y); a.ref=ref;
  // per-tone weighted match (== matchQuality on uniform ground); Split Camo lets 2 colors cover a seam
  const em=effMatch(a.currentPaint, a.currentPaint2, a.splitPaint, ref);
  const mqEff=em.mq; a.mq2=em.mq2;
  const onIce=ref.dominantKey==='ice', inWater=ref.dominantKey==='water';
  const m=updateStillnessFor(a, dt, speed, onIce, inWater);
  const cb=coverBonus(a.x,a.y);
  if(a.freeze) a.freezeCap=Math.min(FREEZE_CAP_MAX, (a.freezeCap||MAX_CONCEAL_OPEN)+dt/0.6); else a.freezeCap=MAX_CONCEAL_OPEN;
  const conceal=concealment(mqEff, a.S, cb, terrainConcealCap(ref.dominantKey), a.freezeCap);
  let C=conspicuity(conceal,m,a.shifting);
  if(a.dashFlare>0){ C=clamp01(C+DASH_FLARE*(a.dashFlare/DASH_FLARE_TIME)); a.dashFlare=Math.max(0,a.dashFlare-dt); }
  a.mq=mqEff; a.m=m; a.conceal=conceal; a.C=C;
}
function computeCamo(dt, speed){ updatePaint(dt); computeCamoFor(player, dt, speed); }
// paint crawl for any actor
function crawlPaint(a,dt){ let maxd=0; for(const ch of ['r','g','b']){ const step=PAINT_SHIFT_SPEED*dt;
  a.currentPaint[ch]+=clamp(a.targetPaint[ch]-a.currentPaint[ch],-step,step);
  maxd=Math.max(maxd,Math.abs(a.targetPaint[ch]-a.currentPaint[ch])); } a.shifting=maxd>SHIFT_DELTA_EPS; }

/* ============================ P20 ONLINE — 1v1 hider vs hunter ============================ */
// Host = the HIDER, runs the real authoritative sim (their UFO #1 is driven by the remote human).
// Guest = the HUNTER, literally plays HUNT mode — except the "bot" is a live human streamed in
// snapshots, and all catch/win decisions come from the host. The relay is a dumb pipe (server/).
const NET={ ws:null, on:false, role:null, code:null, peer:false, status:'off', err:'',
  codeInput:'', pend:null, sendT:0, snapT:0, lastSnapAt:0, intent:{mx:0,my:0} };
function mpServerUrl(){
  try{ const q=new URLSearchParams(location.search).get('mp'); if(q) return q; }catch(_){}
  if(location.protocol==='file:') return 'ws://localhost:8080/ws';
  return (location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws';
}
function netConnect(then){
  if(NET.ws && NET.on){ then&&then(); return; }
  NET.status='connecting'; NET.err='';
  let ws; try{ ws=new WebSocket(mpServerUrl()); }catch(e){ NET.status='off'; NET.err='bad server address'; return; }
  NET.ws=ws;
  ws.onopen=()=>{ NET.on=true; NET.status='lobby'; then&&then(); };
  ws.onmessage=(ev)=>{ let m; try{ m=JSON.parse(ev.data); }catch(_){ return; } netOnServer(m); };
  ws.onerror=()=>{ NET.err='could not reach the relay'; };
  ws.onclose=()=>{ const was=NET.on; netReset(false);
    if(was && appState==='ROUND'){ showToast('🌐 connection lost'); gotoTitle(); }
    else if(appState==='ONLINE'||appState==='ONLINE_JOIN'){ NET.status='off'; } };
}
function netSend(data){ try{ if(NET.ws&&NET.ws.readyState===1) NET.ws.send(JSON.stringify({t:'msg',data})); }catch(_){} }
function netReset(closeWs){ if(closeWs!==false){ try{ NET.ws&&NET.ws.close(); }catch(_){} }
  NET.ws=null; NET.on=false; NET.role=null; NET.code=null; NET.peer=false; NET.status='off'; NET.pend=null; NET.codeInput=''; }
function netLeave(){ netSend({k:'bye'}); netReset(); }
function netOnServer(m){
  if(m.t==='hosted'){ NET.role='host'; NET.code=m.code; NET.status='lobby'; }
  else if(m.t==='joined'){ NET.role='guest'; NET.code=m.code; NET.status='lobby'; }
  else if(m.t==='err'){ NET.err=m.why||'error'; SFX.back(); }
  else if(m.t==='peer'){ NET.peer=!!m.on;
    if(m.on){ SFX.confirm();
      if(NET.role==='host'){ pendingMode='VS'; appState='LEVEL_SELECT'; menuIndex=0; showToast('🌐 Player joined — pick the hiding ground'); } }
    else { if(appState==='ROUND'||appState==='SUMMARY'){ showToast('🌐 the other player left'); netReset(); gotoTitle(); }
      else if(NET.role==='host'&&appState==='LEVEL_SELECT'&&pendingMode==='VS'){ showToast('🌐 the other player left'); appState='ONLINE'; }
      else showToast('🌐 the other player left'); } }
  else if(m.t==='msg') netOnPeer(m.data||{});
}
function netOnPeer(d){
  if(d.k==='init' && NET.role==='guest'){
    const e=LEVELS.find(x=>x.name===d.name);
    if(!e){ NET.err='missing map: '+d.name; netSend({k:'ready',ok:0}); return; }
    NET.pend={ entry:e, seed:d.seed>>>0 };
    fetchLevelData(e).then(data=>{ e.data=data; netSend({k:'ready',ok:1}); });
  }
  else if(d.k==='ready' && NET.role==='host' && NET.pend){
    if(!d.ok){ showToast('🌐 guest is missing that map'); appState='LEVEL_SELECT'; return; }
    netSend({k:'start'}); netStartHost(NET.pend.entry, NET.pend.seed);
  }
  else if(d.k==='start' && NET.role==='guest' && NET.pend){ netStartGuest(NET.pend.entry, NET.pend.seed); }
  else if(d.k==='in' && NET.role==='host'){ NET.intent.mx=clamp(+d.mx||0,-1,1); NET.intent.my=clamp(+d.my||0,-1,1); }
  else if(d.k==='st' && NET.role==='guest'){ netApplySnap(d); }
  else if(d.k==='end' && NET.role==='guest'){ netGuestEnd(d); }
  else if(d.k==='bye'){ if(appState==='ROUND'||appState==='SUMMARY'){ showToast('🌐 the other player left'); netReset(); gotoTitle(); } }
}
function netHostPickedLevel(entry){ NET.pend={ entry, seed:(((Math.random()*0x7fffffff)|0))>>>0 };
  netSend({k:'init', name:entry.name, seed:NET.pend.seed}); appState='ONLINE'; NET.status='loading'; }

// ---- host side: drive the remote hunter + stream snapshots (called from the fixed-step sim) ----
function remoteUfoStep(u,dt,D){
  const SPD=D.CHASE_SPD*1.12;                                    // region tuning carries into the human hunter
  const mx=NET.intent.mx, my=NET.intent.my, mv=Math.hypot(mx,my);
  if(mv>0.05){ u.vx=mx/Math.max(1,mv)*SPD; u.vy=my/Math.max(1,mv)*SPD; u.heading=Math.atan2(my,mx); }
  else { u.vx*=0.85; u.vy*=0.85; }
  u.x=clamp(u.x+u.vx*dt,0,worldW); u.y=clamp(u.y+u.vy*dt,0,worldH);
  u.scanPhase+=2.2*dt;
  // sensing stays SIMULATED (same rules as bots) so the detection meter + threat arrows tell the truth
  const dx=player.x-u.x, dy=player.y-u.y, d=Math.hypot(dx,dy);
  let signal=0;
  if(d<=D.SCAN_R && losClear(u.x,u.y,player.x,player.y)) signal=player.C*smoothstep(0,1,clamp01(1-d/D.SCAN_R));
  if(signal>D.NOISE_FLOOR){ const grace=round.spawnGrace>0?0.5:1; u.suspicion+=D.SUSPECT_GAIN*signal*dt*grace;
    u.lastSuspect.x+=(player.x-u.lastSuspect.x)*Math.min(1,clamp(signal,0.1,1)*BELIEF_TRACK*dt);
    u.lastSuspect.y+=(player.y-u.lastSuspect.y)*Math.min(1,clamp(signal,0.1,1)*BELIEF_TRACK*dt); }
  else u.suspicion-=D.SUSPECT_DECAY*dt;
  u.suspicion=clamp01(u.suspicion); u.signal=signal;
  // the beam is proximity-engaged like HUNT mode; re-hide still breaks the lock (the hider's tools all work)
  const prev=u.state;
  if(d<BEAM_R && losClear(u.x,u.y,player.x,player.y) && player.C>=BEAM_HOLD_C && round.spawnGrace<=0){
    if(u.state!=='BEAM'){ addTrauma(TRAUMA.beamLock); vibe(40); }
    u.state='BEAM'; u.beamCharge+=(1/D.LOCK_TIME)*dt;
    if(u.beamCharge>=1) triggerAbduction(u);
  } else { u.state = u.suspicion>=ENTER_CHASE ? 'CHASE' : (mv>0.05?'SCAN':'PATROL');
    u.beamCharge=Math.max(0,u.beamCharge-BEAM_DRAIN*dt); }
  if(prev==='BEAM'&&u.state!=='BEAM'&&!round.caught&&u.beamCharge>0.05){ round.metrics.nearMisses++; nearMiss(); }
  if(prev!=='CHASE'&&prev!=='BEAM'&&(u.state==='CHASE'||u.state==='BEAM')){ round.metrics.spottedCount++;
    round.spottedReason=spottedReason(player.mq,player.m,player.S,player.ref.dominantKey);
    round.reasonUntil=nowMs()+2600; SFX.spotted(); FX.spottedV=1;
    if(ctrlMode!=='MOVE'&&!round.diff.practice){ goHome(); panBoost=HOLD_GLIDE_MUL; showToast('Spotted — move!'); } }
}
function stepHostNet(dt){
  NET.snapT+=dt; if(NET.snapT<1/12) return; NET.snapT=0;
  const u=round.ufos[0]||{};
  netSend({ k:'st', tl:Math.round(round.timeLeft*10)/10, gr:round.spawnGrace>0?1:0,
    h:{ x:Math.round(player.x), y:Math.round(player.y), c1:rgb2hex(player.currentPaint),

// ---- guest side: send input, predict own saucer, render the streamed hider ----
function netApplySnap(d){
  if(!round||round.online!=='guest') return;
  NET.lastSnapAt=nowMs();
  round.timeLeft=d.tl; round.spawnGrace=d.gr?1:0;
  const b=round.bots[0];
  if(b){ b._tx=d.h.x; b._ty=d.h.y; b.currentPaint=hex2rgb(d.h.c1)||b.currentPaint;
    b.currentPaint2=d.h.c2?hex2rgb(d.h.c2):null; b.conceal=d.h.cz; b.C=clamp01(1-d.h.cz);
    b.pose=d.h.po; b.facing=d.h.fa; b.alive=!!d.h.al; }
  NET.uSnap=d.u;
}
function stepGuestNet(dt){
  // countdown runs locally for feel; the host clock arrives with every snapshot
  if(roundState==='COUNTDOWN'){ round.countdown-=dt;
    const c=Math.ceil(round.countdown); if(c!==round.lastCount&&c>0){ round.lastCount=c; SFX.count(); }
    if(round.countdown<=0){ roundState='PLAYING'; SFX.go(); } return; }
  if(roundState!=='PLAYING') return;
  gatherInput();
  NET.sendT+=dt; if(NET.sendT>=1/20){ NET.sendT=0; netSend({k:'in', mx:+input.mx.toFixed(2), my:+input.my.toFixed(2)}); }
  // predict own saucer, then ease toward the host's authority — snappy but honest
  const D=round.diff, SPD=D.CHASE_SPD*1.12, mv=Math.hypot(input.mx,input.my);
  if(mv>0.05){ player.x+=input.mx/Math.max(1,mv)*SPD*dt; player.y+=input.my/Math.max(1,mv)*SPD*dt;
    player.facing=Math.atan2(input.my,input.mx); }
  player.x=clamp(player.x,0,worldW); player.y=clamp(player.y,0,worldH);
  if(NET.uSnap){ player.x+=(NET.uSnap.x-player.x)*Math.min(1,dt*3); player.y+=(NET.uSnap.y-player.y)*Math.min(1,dt*3);
    player.beamCharge=NET.uSnap.bc||0; }
  const b=round.bots[0];
  if(b){ if(b._tx!=null){ b.x+=(b._tx-b.x)*Math.min(1,dt*12); b.y+=(b._ty-b.y)*Math.min(1,dt*12); }
    b.breathP=(b.breathP||0)+dt*1.6;
    player.beamTarget = (player.beamCharge>0.02 && !b.caught) ? b : null; }
  if(nowMs()-NET.lastSnapAt>4000){ showToast('🌐 connection lost'); netReset(); gotoTitle(); }
}
function netGuestEnd(d){
  if(!round) return;

function botHiderThink(b,dt){ b.stateT+=dt; b.animT+=dt;

function stepSim(dt){

  for(let i=round.inks.length-1;i>=0;i--){ round.inks[i].life-=dt; if(round.inks[i].life<=0) round.inks.splice(i,1); }

    d.PATROL_SPD=DIFF.EASY.PATROL_SPD*Math.min(1.7,ramp); d.CHASE_SPD=DIFF.EASY.CHASE_SPD*Math.min(1.5,ramp);
    d.INVEST_SPD=DIFF.EASY.INVEST_SPD*Math.min(1.5,ramp); d.SCAN_SPD=DIFF.EASY.SCAN_SPD*Math.min(1.5,ramp);

}

function finishRound(outcome){
  if(round.finalized) return; round.finalized=true; stopAllLoops();
  const M=round.metrics, survSec=M.survivalMs/1000;
  const timerSec=isFinite(round.diff.SURVIVE_TIME)?round.diff.SURVIVE_TIME:Math.max(1,survSec);
  const avgBlend=survSec>0?M.blendAccum/survSec:0, survived=(outcome==='WIN');
  const base=survSec*10, blendBonus=Math.round(avgBlend*500), hiddenBonus=Math.round(M.lowDetectMs/1000*6);
  const streakBonus=Math.round(M.streakBestMs/1000*8), missBonus=M.nearMisses*150, spotPenalty=M.spottedCount*40;
  const winBonus=survived?(300+round.diff.diffIndex*200):0;
  const score=Math.max(0,Math.round(base+blendBonus+hiddenBonus+streakBonus+missBonus-spotPenalty+winBonus));
  const survRatio=survived?1:clamp01(survSec/timerSec);
  const quality=0.5*avgBlend+0.3*(M.lowDetectMs/Math.max(1,M.survivalMs))+0.2*clamp01(M.streakBestMs/30000);
  const perf=0.6*survRatio+0.4*quality;
  const grade=perf>=GRADE.S?'S':perf>=GRADE.A?'A':perf>=GRADE.B?'B':perf>=GRADE.C?'C':perf>=GRADE.D?'D':'F';
  const summary={ outcome, score, grade, survSec, avgBlendPct:Math.round(avgBlend*100),
    streak:M.streakBestMs/1000, near:M.nearMisses, spotted:M.spottedCount, ghostSec:M.ghostMs/1000, isBest:false, prevBest:0, t0:nowMs() };
  if(!round.diff.practice){ const key=round.entry.display+'|'+round.mode+'|'+round.diff.label;
    const b=best[key]||{bestScore:0,bestSurvivalMs:0,bestGrade:'F',plays:0};
    summary.prevBest=b.bestScore; summary.isBest=score>b.bestScore; b.plays++;
    if(score>b.bestScore){ b.bestScore=score; b.bestGrade=grade; } b.bestSurvivalMs=Math.max(b.bestSurvivalMs,M.survivalMs);
    b.updated=Date.now(); best[key]=b; saveBest(); if(summary.isBest) SFX.best(); }

}

  drawHumanoid(cx, 60, 0, '#EDEFF4', 0, { pose:player.pose, r:22, skin:PROGRESS.equipped.skin, breathP:hueAnim*2, blinkE:0 });

  const chip=(s,x,y,w)=>{ const unlocked=s.unlock===null||hasUnlock(s.id), equipped=PROGRESS.equipped.skin===s.id;
    ctx.fillStyle=equipped?'rgba(242,179,61,0.18)':'rgba(21,27,44,0.9)'; rr(x,y,w,w,9); ctx.fill();
    ctx.strokeStyle=equipped?COL.amber:(unlocked?COL.line:'#242c44'); ctx.lineWidth=equipped?2:1; rr(x,y,w,w,9); ctx.stroke();
    ctx.save(); ctx.translate(x+w/2,y+w*0.5); const R=w*0.26;
    ctx.fillStyle=unlocked?'#EDEFF4':'#333a4e'; ctx.beginPath(); ctx.arc(0,0,R,0,TAU); ctx.fill();
    ctx.fillStyle='#0a0a12'; ctx.beginPath(); ctx.arc(R*0.35,-R*0.22,R*0.16,0,TAU); ctx.arc(R*0.35,R*0.22,R*0.16,0,TAU); ctx.fill();
    if(unlocked && s.draw){ s.draw(0,R,1); ctx.globalAlpha=1; } ctx.restore();
    if(unlocked) navList.push({x,y,w,h:w,fn:()=>{ PROGRESS.equipped.skin=s.id; saveProgress(); SFX.ui(); }}); };
  // P12: level header (top-left, clear of the preview figure)
  { const L=xpLevel(PROGRESS.xp||0), hi=xpCeil(L), lo=xpFloor(L), frac=clamp01(((PROGRESS.xp||0)-lo)/(hi-lo));
    const xw=Math.min(150,vpW*0.3);
    txt('LEVEL '+L, 14, 26, 12, COL.cyan,'left','800');
    ctx.fillStyle='#0A0E19'; rr(14,36,xw,7,3); ctx.fill();
    ctx.fillStyle=COL.cyan; rr(14,36,Math.max(5,xw*frac),7,3); ctx.fill();
    txt((PROGRESS.xp||0)+' / '+hi+' XP', 14, 54, 9, COL.muted,'left','600');
    const done=CHALLENGES.filter(c=>PROGRESS.challenges[c.id]).length;
    txt('🏆 '+done+' / '+CHALLENGES.length+' challenges', vpW-14, 26, 10, done===CHALLENGES.length?COL.amber:COL.muted,'right','700'); }
  let y=90;
  // --- head accents (wrapping grid — the catalog grew past one row) ---
  const accents=SKINS.filter(s=>!s.medal);
  txt('HEAD ACCENTS', cx, y, 9, COL.amber,'center','700'); y+=12;
  const perRow=Math.min(accents.length, Math.max(5, Math.floor((vpW-40)/60)));
  const cw=Math.min(vpH<520?38:52,(vpW-40)/perRow);   // short viewports compress the chips so the page still fits
  for(let r0=0; r0<accents.length; r0+=perRow){
    const rowN=Math.min(perRow, accents.length-r0);
    const aw=rowN*cw+(rowN-1)*gap, axx=(vpW-aw)/2;
    for(let i=0;i<rowN;i++){ const s=accents[r0+i], x=axx+i*(cw+gap); chip(s,x,y,cw);
      txt(s.unlock===null||hasUnlock(s.id)?s.name:'🔒', x+cw/2, y+cw+8, 8, (PROGRESS.equipped.skin===s.id)?COL.amber:COL.muted,'center','600'); }
    y+=cw+18;
  }
  y+=4;
  // --- trails (P16 second equip slot) ---
  txt('TRAILS', cx, y, 9, COL.amber,'center','700'); y+=12;
  { const tcw=Math.min(46,(vpW-40)/TRAILS.length), tw2=TRAILS.length*tcw+(TRAILS.length-1)*gap, txx=(vpW-tw2)/2;
    const dotCol={trail_bubbles:'rgba(150,220,235,0.9)', trail_sparks:'#F2B33D', trail_leaves:'#5fae52'};
    TRAILS.forEach((t,i)=>{ const x=txx+i*(tcw+gap);
      const unlocked=t.unlock===null||hasUnlock(t.id), eq=PROGRESS.equipped.trail===t.id;
      ctx.fillStyle=eq?'rgba(242,179,61,0.18)':'rgba(21,27,44,0.9)'; rr(x,y,tcw,tcw,9); ctx.fill();
      ctx.strokeStyle=eq?COL.amber:(unlocked?COL.line:'#242c44'); ctx.lineWidth=eq?2:1; rr(x,y,tcw,tcw,9); ctx.stroke();
      ctx.save(); ctx.translate(x+tcw/2,y+tcw/2); const k=tcw/46;
      if(!dotCol[t.id]){ ctx.strokeStyle=unlocked?COL.muted:'#333a4e'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(-10*k,10*k); ctx.lineTo(10*k,-10*k); ctx.stroke(); }
      else { ctx.fillStyle=unlocked?dotCol[t.id]:'#333a4e';
        for(const [dx,dy,r] of [[-9,7,1.8],[-2,1,2.5],[6,-5,3.2]]){ ctx.beginPath(); ctx.arc(dx*k,dy*k,r*k,0,TAU); ctx.fill(); } }
      ctx.restore();
      txt(unlocked?t.name:'🔒', x+tcw/2, y+tcw+8, 8, eq?COL.amber:COL.muted,'center','600');
      if(unlocked) navList.push({x,y,w:tcw,h:tcw,fn:()=>{ PROGRESS.equipped.trail=t.id; saveProgress(); SFX.ui(); }}); });
    y+=tcw+20; }
  // --- biome medals ---
  const medals=SKINS.filter(s=>s.medal);
  const loggedCount=BLENDBOOK_KEYS.filter(k=>PROGRESS.blendbook[k]&&PROGRESS.blendbook[k].logged).length;
  const medalCount=Object.keys(PROGRESS.biomeMedals||{}).filter(b=>PROGRESS.biomeMedals[b]).length;
  txt('BIOME MEDALS · '+medalCount+' / 6', cx, y, 9, COL.amber,'center','700'); y+=12;
  const mcw=Math.min(46,(vpW-40)/6), mw=6*mcw+5*gap, mxx=(vpW-mw)/2;
  medals.forEach((s,i)=> chip(s, mxx+i*(mcw+gap), y, mcw)); y+=mcw+20;
  // --- Blend Book (single row of 14 terrain pages; logged only when the SIM says you vanished) ---
  txt('BLEND BOOK · '+loggedCount+' / 14', cx, y, 9, COL.amber,'center','700'); y+=12;
  const per=BLENDBOOK_KEYS.length, bcw=Math.min(34,(vpW-28)/per), bgap=Math.min(gap,(vpW-28-per*bcw)/(per-1)), bw2=per*bcw+(per-1)*bgap, bxx=(vpW-bw2)/2;
  BLENDBOOK_KEYS.forEach((k,i)=>{ const x=bxx+i*(bcw+bgap), e=PROGRESS.blendbook[k], done=e&&e.logged;
    ctx.globalAlpha=done?1:0.32; ctx.fillStyle=TERRAIN_HEX[k]||'#444'; rr(x,y,bcw,bcw,5); ctx.fill();
    ctx.globalAlpha=1; ctx.strokeStyle=done?COL.amber:'#242c44'; ctx.lineWidth=done?1.5:1; rr(x,y,bcw,bcw,5); ctx.stroke();
    if(done) txt(Math.round((e.bestMq||0)*100)+'', x+bcw/2, y+bcw/2, 8.5, '#000','center','800'); }); y+=bcw+18;
  // --- challenges (visible goals; hidden on very short screens — the header counter still shows) ---
  if(vpH>=560){
    const done=CHALLENGES.filter(c=>PROGRESS.challenges[c.id]).length;
    txt('CHALLENGES · '+done+' / '+CHALLENGES.length, cx, y, 9, COL.amber,'center','700'); y+=13;
    const twoCol=vpW>=620, colW=twoCol?Math.min(300,(vpW-48)/2):Math.min(360,vpW-40);
    const x0=twoCol?cx-colW-8:cx-colW/2;
    CHALLENGES.forEach((c,i)=>{ const col=twoCol?(i%2):0, row=twoCol?(i/2|0):i;
      const x=twoCol?(x0+col*(colW+16)):x0, yy=y+row*15;
      const got=!!PROGRESS.challenges[c.id];
      txt((got?'🏆 ':'○ ')+c.name, x, yy, 9.5, got?COL.amber:COL.txt,'left','700');
      txt(got?'done!':c.hint, x+colW, yy, 8, got?COL.amber:COL.muted,'right','500'); });
    y+=(twoCol?Math.ceil(CHALLENGES.length/2):CHALLENGES.length)*15+8;
  }
  // --- poses (compact) + back ---
  txt('Poses (cycle in-game with [ / ] or 🕺):  '+POSE_KEYS.map(k=>(UNLOCKABLE_POSES.indexOf(k)<0||hasUnlock(k)?'':'🔒')+POSE_NAMES[k]).join(' · '),
    cx, y+4, 8.5, COL.muted,'center','500');
  const bw=Math.min(200,vpW-48); navBtn('‹ Back', cx-bw/2, vpH-46, bw, 36, ()=>{ appState='TITLE'; menuIndex=0; }, {size:14});
}

function drawHelp(){ ctx.fillStyle='rgba(8,12,25,0.88)'; ctx.fillRect(0,0,vpW,vpH);
  const cx=vpW/2; let y=vpH*0.14;
  txt('HOW TO PLAY', cx, y, 24, COL.amber,'center','800'); y+=44;
  const lines=[
    'You are a person, seen from above — paint your body to match the ground.',
    'UFOs scan from their ships for anything that does not match the terrain.',
    '',
    '🕹  MOVE: drag the move side — push gently to SNEAK, far to walk.',
    '      Drag the other side to peek toward the ships.',
    '👁  LOOK: tap 👁 to plant yourself and rise to the hunters’ altitude.',
    '      Drag to look around · pinch or scroll to zoom in and out.',
    '🎨  PAINT: tap 🎨 — the view is HELD like a photo while you paint.',
    '      MATCH samples the ground; nudge the color until you read “HIDDEN”.',
    '      Tap empty space to look again — your framing stays put.',
    '⏱  HOLD STILL to settle. 🌳 Hug cover. The MODE pill takes you home.',
    '',
    'Desktop: WASD move · Shift sneak · E paint · I look · scroll zoom · Q match · Esc back',
  ];
  for(const l of lines){ txt(l, cx, y, 13.5, /^(🕹|🎨|👁|⏱)/.test(l)?COL.txt:COL.muted, 'center', '500'); y+=Math.min(26,(vpH*0.62)/lines.length); }
  y+=14; const bw=Math.min(220,vpW-48); navList=[]; menuIndex=0;
  navBtn('Got it', cx-bw/2, y, bw, 46, ()=>{ showHelp=false; }, {size:15, weight:'700'});
  navListApp=appState;
}

/* ============================ MAIN LOOP ============================ */
function frame(now){
  const realDt=Math.min(MAX_FRAME_DT, (now-lastFrame)/1000 || 0); lastFrame=now;
  gfx.frame++; gfx.t=now/1000; updatePerf(realDt); updateTweens(realDt); updateStreaks(realDt);
  updateGamepadEdges();
  let simDt=realDt;
  if(FX.hitstop>0){ FX.hitstop-=realDt*1000; simDt=0; } else simDt=realDt*FX.slowScale;
  if(appState==='ROUND'){
    if(roundState==='PLAYING'||roundState==='COUNTDOWN'||roundState==='RESUME_COUNTDOWN'){
      acc+=simDt; let steps=0; while(acc>=DT_FIXED && steps<5){ stepSim(DT_FIXED); acc-=DT_FIXED; steps++; }
      if(steps>=5) acc=0;
    }
    if(roundState==='CAUGHT'){ player.abductT+=realDt; if(player.abductT>=ABDUCT_CUTSCENE) finishRound('LOSE'); }
    else if(roundState==='TIMEOUT'){ round.summaryT+=realDt; if(round.summaryT>=TIMEOUT_ANIM) finishRound('WIN'); }
    updateParticles(realDt); updateAmbient(realDt); updateChameleonAnim(realDt); updateCamera(realDt);
    if(roundState==='PLAYING') stepTour(realDt);   // P14: the tour tracks REAL time (practice slow-mo would stall its steps)
    if(appState==='ROUND'){ updateDrone(round.nearUfo||0); updateSuspicionAudio(realDt);
      let beaming=false,ch=0; for(const u of round.ufos){ if(u.state==='BEAM'){ beaming=true; ch=Math.max(ch,u.beamCharge); } }
      updateBeamSound(beaming,ch);
      drawRound();
      if(pendingShot){ pendingShot=false;   // capture the framed WORLD, before any HUD lands on it
        try{ const a=document.createElement('a'); a.href=cv.toDataURL('image/png');
          a.download='abduct-a-chameleon-shot.png'; a.click(); showToast('📷 shot saved'); }
        catch(_){ showToast('📷 could not save'); } }
      drawRoundHUD(); drawStreaks();
      if(FX.flash>0.01){ applyScreenTransform(); ctx.globalAlpha=Math.min(1,FX.flash); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,vpW,vpH); ctx.globalAlpha=1; }
    } else { drawMenu(); }
  } else { hueAnim+=realDt; stopAllLoops(); drawMenu(); }
  drawToast();
  requestAnimationFrame(frame);
}

/* ============================ §12 BOOT ============================ */
function resize(){ dpr=Math.min(dprCap, window.devicePixelRatio||1); vpW=window.innerWidth||360; vpH=window.innerHeight||640;
  cv.width=Math.max(1,Math.floor(vpW*dpr)); cv.height=Math.max(1,Math.floor(vpH*dpr));
  cv.style.width=vpW+'px'; cv.style.height=vpH+'px'; computeZoom();
  _vigGrad=null; _scanPat=null; if(MAP) buildSky(); }
function loadPersist(){ try{ const s=JSON.parse(localStorage.getItem(LS_SETTINGS)||'null'); if(s) Object.assign(settings,s); }catch(_){}
  try{ if(!localStorage.getItem(LS_SETTINGS) && matchMedia('(prefers-reduced-motion:reduce)').matches) settings.motion='reduced'; }catch(_){}
  applySettingsRuntime();
  try{ const b=JSON.parse(localStorage.getItem(LS_BEST)||'null'); if(b&&typeof b==='object') best=b; }catch(_){} }
function saveSettings(){ try{ localStorage.setItem(LS_SETTINGS, JSON.stringify(settings)); }catch(_){} }
function saveBest(){ try{ localStorage.setItem(LS_BEST, JSON.stringify(best)); }catch(_){} }

function boot(){
  for(const k in TERRAIN_HEX) TERRAIN_RGB[k]=hex2rgb(TERRAIN_HEX[k]);
  ctx=cv.getContext('2d');
  buildGlows();
  loadPersist(); loadProgress();
  player.currentPaint=Object.assign({},TERRAIN_RGB.grass);
  player.targetPaint=Object.assign({},TERRAIN_RGB.grass);
  player.paintHSV=rgb2hsv(player.currentPaint);
  resize(); addEventListener('resize', resize);
  document.addEventListener('visibilitychange', ()=>{ if(document.hidden && appState==='ROUND' && roundState==='PLAYING') togglePause(); });
  appState='BOOT';
  loadLevels().then(()=>{ appState='TITLE'; }).catch(()=>{ appState='TITLE'; });
  lastFrame=performance.now();
  requestAnimationFrame(frame);
}
// lightweight diagnostic hook (harmless in production; used by headless tests / console)
try{ window.__aac = { get state(){ return { appState, roundState,
  ufos: round?round.ufos.length:0, ufoStates: round?round.ufos.map(u=>u.state):[],
  alive: player.alive, mq:+player.mq.toFixed(3), conceal:+player.conceal.toFixed(3),
  C:+player.C.toFixed(3), terrain: player.ref?player.ref.dominantKey:null,
  timeLeft: round?Math.round(round.timeLeft):null, levels: LEVELS.length,
  playerPos:{x:Math.round(player.x),y:Math.round(player.y)},
  ufoPos: round?round.ufos.map(u=>({x:Math.round(u.x),y:Math.round(u.y),s:u.state,susp:+u.suspicion.toFixed(2),beam:+u.beamCharge.toFixed(2)})):[],
  summary: round&&round.summary?round.summary:null,
  ability: round?{freeze:player.freeze,dashCd:+player.cd.dash.toFixed(2),decoyCd:+player.cd.decoy.toFixed(2),inkCd:+player.cd.ink.toFixed(2),freezeCap:+player.freezeCap.toFixed(3)}:null,
  decoys: round?round.decoys.length:0, inks: round?round.inks.length:0, pose: player.pose,
  ta: round&&round.mode==='TA'?{ beacons:round.beacons.length, banked:round.taBanked, timeLeft:Math.round(round.timeLeft), beaconPos:round.beacons.map(b=>({x:Math.round(b.x),y:Math.round(b.y),banked:b.banked})) }:null,
  hunt: round&&round.mode==='HUNT'?{ bots: round.bots.length, caught: round.hunterCaught||0, pinged: round.bots.filter(b=>b.pinged>0).length, botStates: round.bots.map(b=>b.state), botC: round.bots.map(b=>+b.C.toFixed(2)), pulseCd:+player.pulseCd.toFixed(2), botPos: round.bots.map(b=>({x:Math.round(b.x),y:Math.round(b.y),caught:b.caught,C:+b.C.toFixed(2),pinged:+(b.pinged>0)})) }:null,
  // ---- P8 "Living Camo" (add-only) ----
  paint:(function(){ const co=paintCoach(); return { mqNow:+co.mqNow.toFixed(3), mqAim:+co.mqAim.toFixed(3), word:co.word, hint:co.hint }; })(),   // mqAim mirrors effMatch (single or 2-tone)
  studio:{ open:studio.open, svV:+player.paintHSV.v.toFixed(3), activeTone:studio.activeTone||0,
           t0:rgb2hex(player.targetPaint), t1:rgb2hex(player.targetPaint2),
           svRect: studio.open?studioRects().sv:null, splitRect: studio.open?studioRects().split:null, closeRect: studio.open?studioRects().close:null },
  split: !!player.splitPaint, mq2:+((player.mq2||0)).toFixed(3),
  tones: player.ref&&player.ref.tones?player.ref.tones.map(t=>({key:t.key,w:+t.w.toFixed(2)})):null,
  snapCount: player.snapCount||0, ghostMs: Math.round(round?(round.metrics.ghostMs||0):0),
  particles: particles.length, dripEmitted: dripEmitted,
  progress:{ blendbook:PROGRESS.blendbook||{}, biomeMedals:PROGRESS.biomeMedals||{}, unlocks:PROGRESS.unlocks,
             xp:PROGRESS.xp||0, level:xpLevel(PROGRESS.xp||0), challenges:PROGRESS.challenges||{}, daily:PROGRESS.daily||{} },
  // ---- mode-based controls ----
  mode:ctrlMode, cam:{x:Math.round(cam.x),y:Math.round(cam.y)}, camFollow:{x:Math.round(camFollow.x),y:Math.round(camFollow.y)},
  camPan:{x:Math.round(camPan.x),y:Math.round(camPan.y)}, zoom:+zoom.toFixed(3),
  inspect:{active:ctrlMode==='INSPECT',zoomT:+inspectZoomT.toFixed(2)},
  hold:{locked:camLock, vz:+vz.toFixed(3), vzTarget:+vzTarget.toFixed(3), pinch:!!pinch, brackets:+holdBracketT.toFixed(2)},
  tour:{active:tut.active, step:tut.step}, levelOrder:levelOrderNames,
  region: round?{ biome:round.biome||null, tuned:round.diff._regionTuned||null, scanR:Math.round(round.diff.SCAN_R||0) }:null,
  net:{ status:NET.status, role:NET.role, code:NET.code, peer:NET.peer, online:round?(round.online||null):null },
  embed:{ embedded:EMBED, lsOk:LS_OK },
  move:{speed:+((input&&input.speed)||0).toFixed(1),mag:+((input&&input.moveMag)||0).toFixed(3),tag:(input&&input.moveTag)||'idle'},
  speed:+Math.hypot(player.vx,player.vy).toFixed(1), hud:_hud,
  perf:{dpr:+dpr.toFixed(2),dprCap:+dprCap.toFixed(2),qLevel} }; } }; }catch(_){}
boot();
